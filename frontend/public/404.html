<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>RARE Art Gallery</title>
    <script>
      // GitHub Pages SPA redirect hack
      // When GitHub serves a 404, this page redirects back to index.html
      // with the path encoded as a query parameter, which index.html then restores.
      var segmentCount = 1; // number of path segments in the repo name (e.g. /RARE/ = 1)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
